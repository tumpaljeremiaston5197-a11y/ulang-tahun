<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartu Ucapan Ulang Tahun</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

/* CONTAINER */
.container{
    position:relative;
    text-align:center;
}

/* ENVELOPE */
.envelope{
    width:220px;
    height:150px;
    background:#ff6f91;
    position:relative;
    cursor:pointer;
    border-radius:6px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* FLAP */
.flap{
    position:absolute;
    width:0;
    height:0;
    border-left:110px solid transparent;
    border-right:110px solid transparent;
    border-bottom:75px solid #ff3f6c;
    top:-75px;
    transform-origin:bottom;
    transition:0.6s;
}

/* CARD */
.card{
    position:absolute;
    width:200px;
    height:140px;
    background:white;
    left:10px;
    top:10px;
    border-radius:6px;
    padding:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transform:translateY(40px);
    opacity:0;
    transition:0.8s;
}

.card h2{
    color:#ff3f6c;
    margin:5px 0;
}

.card p{
    font-size:14px;
}

/* OPEN STATE */
.open .flap{
    transform:rotateX(180deg);
}

.open .card{
    transform:translateY(-120px);
    opacity:1;
}

/* DECORATION */
.heart{
    position:absolute;
    color:white;
    font-size:20px;
    animation:float 4s infinite;
}

@keyframes float{
    0%{transform:translateY(0)}
    50%{transform:translateY(-20px)}
    100%{transform:translateY(0)}
}

/* CONFETTI */
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    background:red;
    top:-10px;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(720deg);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="container" onclick="openCard()" id="envelopeBox">

<div class="envelope">
<div class="flap"></div>

<div class="card">
<h2>🎉 Happy Birthday 🎂</h2>
<p>Semoga di umur yang baru ini semua impianmu tercapai.</p>
<p>Semoga selalu sehat, bahagia, dan sukses!</p>
<p>✨ Surprise! ✨</p>
</div>

</div>

<div class="heart" style="top:-40px; left:-20px;">💖</div>
<div class="heart" style="top:-50px; right:-20px;">🎈</div>

</div>

<script>

function openCard(){

let box = document.getElementById("envelopeBox");
box.classList.toggle("open");

for(let i=0;i<40;i++){

let confetti = document.createElement("div");
confetti.className="confetti";

confetti.style.left=Math.random()*window.innerWidth+"px";
confetti.style.background=
"rgb("+Math.random()*255+","+Math.random()*255+","+Math.random()*255+")";

document.body.appendChild(confetti);

setTimeout(()=>confetti.remove(),3000);

}

}

</script>

</body>
</html>
