<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Ucapan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-env: #ffb347;
            --color-env-dark: #e69a2e;
            --color-paper: #ffffff;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fceabb 0%, #f8b500 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Container Utama */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .envelope-wrapper:hover {
            transform: scale(1.05);
        }

        /* Bentuk Amplop */
        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background: var(--color-env);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* Tutup Amplop (Segitiga Atas) */
        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 2;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid var(--color-env-dark);
            transform-origin: top;
            transition: all 0.5s ease-in-out;
        }

        /* Bagian Dalam Amplop */
        .envelope::after {
            content: "";
            position: absolute;
            z-index: 1;
            width: 300px;
            height: 200px;
            background: var(--color-env);
            border-radius: 0 0 10px 10px;
            transform: translate(0);
        }

        /* Kertas di Dalam */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 80%;
            background: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.5s ease-in-out;
            z-index: 0;
            border-radius: 5px;
        }

        .letter p {
            font-size: 14px;
            color: #333;
            margin: 0;
            font-weight: 600;
        }

        /* Hiasan Melayang (Animasi) */
        .decoration {
            position: absolute;
            font-size: 24px;
            animation: float 3s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(20deg); }
        }

        /* State Saat Diklik (Terbuka) */
        .envelope-wrapper.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .envelope-wrapper.open .letter {
            bottom: 100px;
            z-index: 2;
        }

        /* Petunjuk Klik */
        .hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 14px;
            letter-spacing: 2px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
        <span class="decoration" style="top:-50px; left:-30px;">🎁</span>
        <span class="decoration" style="top:-20px; right:-40px; animation-delay: 0.5s;">✨</span>
        <span class="decoration" style="bottom:10px; left:-60px; animation-delay: 1s;">🎉</span>
        <span class="decoration" style="bottom:-20px; right:-20px; animation-delay: 1.5s;">🎈</span>

        <div class="envelope">
            <div class="letter">
                <div style="font-size: 30px; margin-top: 10px;">❤️</div>
            </div>
        </div>
        
        <div class="hint">TAP UNTUK MEMBUKA</div>
    </div>

    <script>
        function openEnvelope() {
            const env = document.getElementById('envelope');
            
            // Tambahkan class open untuk animasi pembuka
            env.classList.add('open');

            // Tunggu 1.2 detik (sampai animasi selesai) baru pindah halaman
            setTimeout(() => {
                // GANTI 'kartu.html' dengan nama file kodingan kartu kamu
                window.location.href = 'kartuhbd.html'; 
            }, 1200);
        }
    </script>
</body>
</html>
