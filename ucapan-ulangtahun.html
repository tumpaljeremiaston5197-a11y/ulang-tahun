<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kartu Ucapan Ulang Tahun</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      padding: 50px;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      max-width: 400px;
      margin: auto;
    }
    h1 {
      color: #ff4081;
    }
    .share-btn {
      margin-top: 20px;
      padding: 10px 20px;
      background: #ff4081;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 Selamat Ulang Tahun 🎂</h1>
    <p id="message">Semoga panjang umur, sehat selalu, dan bahagia!</p>
    <button class="share-btn" onclick="shareCard()">Bagikan Link</button>
  </div>

  <script>
    function shareCard() {
      const url = window.location.href; // ambil link halaman
      if (navigator.share) {
        navigator.share({
          title: 'Kartu Ucapan Ulang Tahun',
          text: 'Lihat kartu ucapan ulang tahun ini!',
          url: url
        }).then(() => {
          console.log('Berhasil dibagikan');
        }).catch(console.error);
      } else {
        // fallback copy link
        navigator.clipboard.writeText(url);
        alert("Link kartu ucapan sudah disalin: " + url);
      }
    }
  </script>
</body>
</html>
